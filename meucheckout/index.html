<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refrigerantes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="assets/imgs/coquinha.jpg" type="image/png">
</head>
<body>
    
    <div class="main-container">
        <div class="card">
            <div class="top-guarana">
                <div class="top-text">
                    <h1><i>Guaraná<hr></i></h1>
                </div>
            </div> 
            <div class="bottom-checkout">
                <div class="price">
                    <h1>$10,00  <hr></h1>
                </div>
                <div class="img">
                    <img src="assets/imgs/guaranazinho.jpg" alt="guarana lata">
                </div>
                <a href="pages/guarana.html" class="btn btn-guarana">COMPRAR</a>
            </div>
        </div>
        <div class="card">
            <div class="top-coca">
                <div class="top-text">
                    <h1><i>Coca-Cola <hr></i></h1>
                </div>
            </div>
            <div class="bottom-checkout">
                <div class="price">
                    <h1>$12,00 <hr></h1>
                </div>
                <div class="img">
                    <img src="assets/imgs/coquinha.jpg" alt="coquinha gelada">
                </div>
                <a href="pages/coca.html" class="btn btn-coca">COMPRAR</a>
            </div>
        </div>
            <div class="card">
                <div class="top-pepsi">
                    <div class="top-text">
                        <h1><i>Pepsi <hr></i></h1>
                    </div>
                </div>
                <div class="bottom-checkout">
                    <div class="price">
                        <h1>$8,00 <hr></h1>
                    </div>
                    <div class="img">
                        <img src="assets/imgs/pepis.jpg" alt="time pepsi">
                    </div>
                    <a href="pages/pepsi.html" class="btn btn-pepsi">COMPRAR</a>
                </div>
            </div>
    </div>

</body>
</html>
